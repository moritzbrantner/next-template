name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GitHub Pages artifact
        env:
          AUTH_SECRET: 0123456789abcdef0123456789abcdef
          AUTH_URL: https://example.invalid
          NEXTAUTH_URL: https://example.invalid
          GITHUB_PAGES: 'true'
          VITE_GITHUB_PAGES: 'true'
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Add GitHub Pages fallbacks
        run: |
          set -euo pipefail

          base_path="/${{ github.event.repository.name }}"
          shell_src="dist/client/_shell.html"

          if [[ ! -f "$shell_src" ]]; then
            echo "Expected SPA shell at $shell_src" >&2
            find dist/client -maxdepth 3 -type f | sort >&2 || true
            exit 1
          fi

          mkdir -p dist/client/en dist/client/de

          # Real files for direct hits and crawlers
          cp "$shell_src" dist/client/en/index.html
          cp "$shell_src" dist/client/de/index.html

          # 404 fallback for unknown routes
          cp "$shell_src" dist/client/404.html

          # Root redirects to default locale
          cat > dist/client/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=${base_path}/en/" />
              <title>Redirecting...</title>
              <script>
                window.location.replace('${base_path}/en/');
              </script>
            </head>
            <body>
              <p><a href="${base_path}/en/">Continue to the app</a></p>
            </body>
          </html>
          EOF

          touch dist/client/.nojekyll

          echo "Built files:"
          find dist/client -maxdepth 3 -type f | sort

          touch dist/client/.nojekyll
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
