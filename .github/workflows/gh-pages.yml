name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify workspace packages
        run: |
          bun run packages:lint
          bun run packages:typecheck
          bun run packages:test

      - name: Build GitHub Pages artifact
        env:
          NEXT_DEPLOY_TARGET: gh-pages
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: bun run build:gh-pages

      - name: Verify Unlighthouse summary output
        run: |
          set -euo pipefail
          test -f .generated/unlighthouse/ci-result.json
          test -f out/en/unlighthouse/index.html
          test -f out/de/unlighthouse/index.html

      - name: Prepare GitHub Pages artifact
        run: |
          set -euo pipefail
          touch out/.nojekyll

          echo "Built files:"
          find out -maxdepth 3 -type f | sort
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
