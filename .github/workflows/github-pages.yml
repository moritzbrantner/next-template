name: GitHub Pages

on:
  workflow_run:
    workflows: ['Beta Tier']
    types: [completed]
    branches: [beta]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build GitHub Pages artifact
        env:
          AUTH_SECRET: 0123456789abcdef0123456789abcdef
          AUTH_URL: https://example.invalid
          NEXTAUTH_URL: https://example.invalid
          GITHUB_PAGES: 'true'
          VITE_GITHUB_PAGES: 'true'
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm run build

      - name: Add GitHub Pages fallbacks
        run: |
          base_path="/${{ github.event.repository.name }}"
          cat > dist/client/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=${base_path}/en/" />
              <title>Redirecting...</title>
              <script>
                window.location.replace('${base_path}/en/');
              </script>
            </head>
            <body>
              <p><a href="${base_path}/en/">Continue to the app</a></p>
            </body>
          </html>
          EOF
          cp dist/client/_shell.html dist/client/404.html
          touch dist/client/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
