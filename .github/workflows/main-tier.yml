name: Main Tier

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: main-tier-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  main-tier:
    name: Main Tier
    uses: ./.github/workflows/tier-checks.yml
    with:
      tier-name: main
      check-command: checks:main