name: Nightly Tier

on:
  pull_request:
    branches: [nightly]
  push:
    branches: [nightly]

jobs:
  nightly-tier:
    name: Nightly Tier
    permissions:
      contents: read
      packages: read
    uses: moritzbrantner/reusable-workflows/.github/workflows/validate-repo.yml@scaffold-v2-initial
    with:
      test_command: bun run checks:nightly
    secrets:
      node_auth_token: ${{ secrets.GH_PACKAGES_TOKEN }}
