name: Nightly - Integration Tests
on:
  pull_request:
    branches: [nightly]
  push:
    branches: [nightly]
jobs:
  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (github.base_ref == 'nightly' || github.base_ref == 'beta')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Integration tests
        run: pnpm test:integration
  auto-merge:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'auto-promotion')
    steps:
      - uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
  promote-to-beta:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-promote-beta-${{ github.sha }}
          base: beta
          title: "🌙 Auto-promote from nightly to beta"
