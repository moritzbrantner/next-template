name: Notify Monorepo Subtree Sync

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  notify-monorepo:
    runs-on: ubuntu-latest

    steps:
      - name: Require monorepo dispatch token
        env:
          MONOREPO_DISPATCH_TOKEN: ${{ secrets.MONOREPO_SUBTREE_DISPATCH_TOKEN }}
        run: |
          if [ -z "${MONOREPO_DISPATCH_TOKEN}" ]; then
            echo "::error::MONOREPO_SUBTREE_DISPATCH_TOKEN is required to notify moritzbrantner/monorepo." >&2
            exit 1
          fi

      - name: Dispatch subtree sync event
        env:
          MONOREPO_DISPATCH_TOKEN: ${{ secrets.MONOREPO_SUBTREE_DISPATCH_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${MONOREPO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/moritzbrantner/monorepo/dispatches \
            -d @- <<EOF
          {
            "event_type": "subtree_sync",
            "client_payload": {
              "source_repo": "next-template",
              "source_branch": "main",
              "source_sha": "${SOURCE_SHA}",
              "prefix": "apps/web"
            }
          }
          EOF
