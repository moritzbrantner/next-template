name: Staging - Benchmarks
on:
  pull_request:
    branches: [staging]
  push:
    branches: [staging]
jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Benchmarks
        run: pnpm benchmark
  staging-ready:
    runs-on: ubuntu-latest
    needs: [benchmarks]
    if: github.event_name == 'push'
    steps:
      - run: echo 'Staging is benchmark validated and ready for release.'
