name: Tier Checks (Reusable)

on:
  workflow_call:
    inputs:
      tier-name:
        required: true
        type: string
      check-command:
        required: true
        type: string

jobs:
  tier-checks:
    name: Tier checks (${{ inputs.tier-name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/next_template?schema=public
      AUTH_SECRET: ci-dummy-auth-secret-not-for-production
      AUTH_URL: http://127.0.0.1:3005
      NEXTAUTH_URL: http://127.0.0.1:3005
      E2E_BASE_URL: http://127.0.0.1:3005
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: next_template
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d next_template"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tier checks
        run: bun run ${{ inputs.check-command }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-${{ inputs.tier-name }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
