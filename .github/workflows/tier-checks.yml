name: Tier Checks (Reusable)

on:
  workflow_call:
    inputs:
      tier-name:
        required: true
        type: string
      check-command:
        required: true
        type: string

jobs:
  tier-checks:
    name: Tier checks (${{ inputs.tier-name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/next_template?schema=public
      AUTH_SECRET: ci-dummy-auth-secret-not-for-production
      AUTH_URL: http://127.0.0.1:3005
      NEXTAUTH_URL: http://127.0.0.1:3005
      E2E_BASE_URL: http://127.0.0.1:3005
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: next_template
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d next_template"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify runtime dependency availability
        run: pnpm ls @aws-sdk/client-s3 --depth 0

      # If main is chromium-only:
      - name: Install Playwright browsers and deps
        if: inputs.check-command == 'checks:main'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tier checks
        run: pnpm run ${{ inputs.check-command }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ inputs.tier-name }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore