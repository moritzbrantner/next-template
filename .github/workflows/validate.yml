name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

jobs:
  fast:
    name: Fast Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run fast checks
        run: bun run checks:nightly

  integration:
    name: Integration Validation
    needs: fast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        run: bun run test:integration

  full:
    name: Full Validation
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check database migrations
        run: bun run db:check

      - name: Build app
        env:
          AUTH_SECRET: ci-build-secret-ci-build-secret
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/next_template?schema=public
          SITE_URL: http://127.0.0.1:3000
          EMAIL_PROVIDER: smtp
          EMAIL_FROM: no-reply@example.com
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: ci
          SMTP_PASSWORD: ci
          SMTP_SECURE: 'false'
          INTERNAL_CRON_SECRET: ci-cron-secret
        run: bun run build

      - name: Run Unlighthouse performance check
        env:
          AUTH_SECRET: ci-build-secret-ci-build-secret
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/next_template?schema=public
          SITE_URL: http://127.0.0.1:3000
          EMAIL_PROVIDER: smtp
          EMAIL_FROM: no-reply@example.com
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: ci
          SMTP_PASSWORD: ci
          SMTP_SECURE: 'false'
          INTERNAL_CRON_SECRET: ci-cron-secret
        run: bun run test:unlighthouse

      - name: Run e2e tests
        run: ./scripts/ci/run-e2e.sh

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: |
            test-results
            playwright-report
