services:
  postgres:
    image: postgres:16-alpine
    container_name: next-template-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: next_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-55433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d next_template"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  postgres_data:
